<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Decryption - Easter Egg</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #080809;
            color: #ffffff;
            font-family: monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }
        /* Glowing tech lines background grid */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(to right, rgba(255, 255, 255, 0.015) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.015) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 1;
        }
        .container {
            position: relative;
            z-index: 5;
            padding: 2.5rem 2rem;
            border-radius: 16px;
            background: rgba(18, 18, 21, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            text-align: center;
            max-width: 90%;
            width: 480px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), 0 0 30px rgba(6, 182, 212, 0.08);
        }
        .icon {
            font-size: 3rem;
            color: #06b6d4;
            margin-bottom: 1.5rem;
            text-shadow: 0 0 15px rgba(6, 182, 212, 0.5);
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        h1 {
            font-size: 1.35rem;
            line-height: 1.6;
            font-weight: bold;
            color: #ffffff;
            letter-spacing: -0.01em;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
        }
        .highlight-cyan {
            color: #06b6d4;
            text-shadow: 0 0 10px rgba(6, 182, 212, 0.35);
        }
        .highlight-violet {
            color: #8b5cf6;
            text-shadow: 0 0 10px rgba(139, 92, 246, 0.35);
        }
        .footer {
            margin-top: 2rem;
            font-size: 0.7rem;
            color: #71717a;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">😂</div>
        <h1>i was having <span class="highlight-cyan">fun</span> , nothing in this <span class="highlight-violet">barcode</span></h1>
        <div class="footer">[ SYSTEM DECRYPTED SUCCESSFUL ]</div>
    </div>
</body>
</html>
